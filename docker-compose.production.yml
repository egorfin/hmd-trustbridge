version: "3.9"

services:
  backend:
    build: ./backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env.production
    ports:
      - "127.0.0.1:8100:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: https://trustbridge-api.a-c-g.fi
    env_file: .env.production
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://trustbridge-api.a-c-g.fi
    ports:
      - "127.0.0.1:3100:3000"
    restart: unless-stopped
